# ============================================================
# 工作流名称：🚀 Build_imm_高通410系列sysupgrade.bin
# 触发条件：仓库调度事件 / 手动触发
# 修改说明：添加 sysupgrade.bin 编译输出支持 + 智能打包逻辑
# ============================================================

name: 🚀 Build_imm_高通410系列

于:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: ' ← 选择是否开启 SSH 调试专业人员使用'
        required: false
        默认: false
        输入: boolean
      profile:
        description: ' ↓ 支持多款型号 手动选择要编译的机型 ↓ '
        输入: choice
        options:
          - ufi003
          - ufi001c
          - ufi001b
          - ufi103s
          - jz02v10
          - qrzl903
          - w001
          - uz801
          - mf32
          - mf601
          - wf2
          - sp970v11
          - sp970v10
          - sp970v110
        默认: sp970v110
        required: true
      upstream:
        description: ' ↓ 选择上游源码仓库 ↓ '
        输入: choice
        options:
          - lkiuyu/immortalwrt
          - inkdemono/immortalwrt
        默认: inkdemono/immortalwrt
        required: true
      custom_hash:
        description: ' ↓ 指定 hash（默认不用填写）↓ '
        required: false
        默认: ''
        输入: string
      extra_packages:
        description: ' ↓ 输入额外包名（逗号或空格分隔，留空则不添加任何额外包）↓ '
        required: false
        默认: ''
        输入: string

env:
  REPO_URL: https://github.com/${{ github.event.inputs.upstream }}
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ${{ format('config/{0}.config', github.event.inputs.profile) }}
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      # ──────────────────────────────────────────────────────
      # 1️⃣ 检出当前仓库代码
      # ──────────────────────────────────────────────────────
      - name: 🚀 编译 (Build)
        uses: actions/checkout@main

      # ──────────────────────────────────────────────────────
      # 2️⃣ 显示硬件信息
      # ──────────────────────────────────────────────────────
      - name: Show hardware info
        run: |
          chmod 755 ./scripts/show_hardware_info.sh
          ./scripts/show_hardware_info.sh

      # ──────────────────────────────────────────────────────
      # 3️⃣ 释放磁盘空间
      # ──────────────────────────────────────────────────────
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: true

      # ──────────────────────────────────────────────────────
      # 4️⃣ 初始化编译环境
      # ──────────────────────────────────────────────────────
      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -y update
          sudo -E apt-get -y install $(curl -fsSL https://raw.githubusercontent.com/xuxin1955/depend_ubuntu2204_openwrt/refs/heads/main/depend_ubuntu2204_openwrt)

      # ──────────────────────────────────────────────────────
      # 5️⃣ 安装 mkbootimg 工具
      # ──────────────────────────────────────────────────────
      - name: mkbootimg build
        run: |
          wget https://github.com/xuxin1955/depend_ubuntu2204_openwrt/releases/download/ubuntu_26.04_LTS_mkbootimg/mkbootimg_34.0.5-12build1_all.deb
          sudo dpkg -i mkbootimg_34.0.5-12build1_all.deb
          sudo apt-get install -f -y
          mkbootimg --help || true
          MKBOOTIMG_PATH=$(which mkbootimg)
          if [ -n "$MKBOOTIMG_PATH" ]; then
            echo "mkbootimg found at: $MKBOOTIMG_PATH"
            file "$MKBOOTIMG_PATH"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi
          sudo timedatectl set-timezone "$TZ"
          sudo chmod 777 /mnt
          df -hT

      # ──────────────────────────────────────────────────────
      # 6️⃣ 确保 Python 构建工具链完整
      # ──────────────────────────────────────────────────────
      - name: Ensure Python build tools
        run: |
          python3 -m pip cache purge
          python3 -m pip install --upgrade --force-reinstall pip
          python3 -m pip install --upgrade --force-reinstall 'setuptools>=65' wheel
          python3 -m pip install --upgrade 'setuptools-scm>=8,<10'
          python3 -m pip install --upgrade cython packaging tomli
          python3 -m pip install Unidecode pyelftools
          python3 -m pip --version
          python3 -c "import setuptools.build_meta; print('setuptools.build_meta OK')"

      # ──────────────────────────────────────────────────────
      # 7️⃣ 读取锁定的上游源码 hash
      # ──────────────────────────────────────────────────────
      - name: 读取锁定的上游 hash (Read locked upstream hash)
        id: lock
        run: |
          CUSTOM_HASH="${{ github.event.inputs.custom_hash }}"
          LOCK_FILE="upstream_lock.txt"
          if [ -n "$CUSTOM_HASH" ]; then
            echo "locked_hash=$CUSTOM_HASH" >> $GITHUB_OUTPUT
            echo "使用用户指定 hash: $CUSTOM_HASH"
          elif [ -f "$LOCK_FILE" ]; then
            HASH=$(cat $LOCK_FILE)
            echo "locked_hash=$HASH" >> $GITHUB_OUTPUT
            echo "使用锁定 hash: $HASH"
          else
            echo "locked_hash=" >> $GITHUB_OUTPUT
            echo "upstream_lock.txt 不存在，使用最新 master"
          fi

      # ──────────────────────────────────────────────────────
      # 8️⃣ 克隆源码仓库
      # ──────────────────────────────────────────────────────
      - name: Clone source code
        working-directory: /mnt
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          if [ -n "${{ steps.lock.outputs.locked_hash }}" ]; then
            cd openwrt && git checkout ${{ steps.lock.outputs.locked_hash }}
          fi
          ln -sf /mnt/openwrt $GITHUB_WORKSPACE/openwrt

      # ──────────────────────────────────────────────────────
      # 9️⃣ 复制 files 目录
      # ──────────────────────────────────────────────────────
      - name: Copy files directory
        run: cp -r files openwrt/files

      # ──────────────────────────────────────────────────────
      # 🔟 加载自定义 feeds 配置
      # ──────────────────────────────────────────────────────
      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      # ──────────────────────────────────────────────────────
      # 1️⃣1️⃣ 更新 feeds 索引
      # ──────────────────────────────────────────────────────
      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      # ──────────────────────────────────────────────────────
      # 1️⃣2️⃣ 移除 smpackage 中冲突的包
      # ──────────────────────────────────────────────────────
      - name: Remove conflicting packages from smpackage
        run: |
          rm -rf openwrt/feeds/smpackage/{base-files,dnsmasq,firewall*,fullconenat,libnftnl,nftables,ppp,opkg,ucl,upx,vsftpd*,miniupnpd-iptables,wireless-regdb}

      # ──────────────────────────────────────────────────────
      # 1️⃣3️⃣ 安装 feeds 包
      # ──────────────────────────────────────────────────────
      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a -f

      # ──────────────────────────────────────────────────────
      # 1️⃣4️⃣ 加载自定义 .config 配置 + 执行 diy-part2.sh
      # ──────────────────────────────────────────────────────
      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      # ──────────────────────────────────────────────────────
      # 1️⃣5️⃣ 安装用户指定的额外软件包
      # ──────────────────────────────────────────────────────
      - name: Install extra packages
        if: ${{ inputs.extra_packages != '' }}
        run: |
          cd openwrt
          echo "=========================================="
          echo "User requested extra packages:"
          echo "${{ inputs.extra_packages }}"
          echo "=========================================="
          PACKAGES=$(echo '${{ inputs.extra_packages }}' | sed 's/,/ /g')
          for pkg in $PACKAGES; do
            if [ -n "$pkg" ]; then
              echo "Adding package to .config: CONFIG_PACKAGE_$pkg=y"
              echo "CONFIG_PACKAGE_$pkg=y" >> .config
            fi
          done

      # ──────────────────────────────────────────────────────
      # 1️⃣6️⃣ SSH 调试入口
      # ──────────────────────────────────────────────────────
      - name: SSH 调试有效时间6h! 连接后输入q 输入exit即可退出，自动继续后续编译流程
        uses: mxschmitt/action-tmate@master
        if: ${{ inputs.ssh || contains(github.event.action, 'ssh') }}

      # ──────────────────────────────────────────────────────
      # 1️⃣7️⃣ 生成 defconfig
      # ──────────────────────────────────────────────────────
      - name: Config defconfig
        id: config
        run: |
          cd openwrt
          make defconfig

      # ──────────────────────────────────────────────────────
      # 1️⃣8️⃣ 预下载所有源码包
      # ──────────────────────────────────────────────────────
      - name: Download package
        id: package
        run: |
          cd openwrt
          make download -j4 V=s
          find dl -size -1024c -exec ls -l {} ;
          find dl -size -1024c -exec rm -f {} ;

      # ──────────────────────────────────────────────────────
      # 1️⃣9️⃣ 调试：查看关键目录结构
      # ──────────────────────────────────────────────────────
      - name: 查看 openwrt 目录
        run: |
          ls -la openwrt/
          ls -l .config
          ls -la openwrt/.config

      # ──────────────────────────────────────────────────────
      # 2️⃣0️⃣ 上传 .config 配置供下载/复用
      # ──────────────────────────────────────────────────────
      - name: 自动上传最新源码生成.config编译配置
        uses: actions/upload-artifact@main
        with:
          name: build-config
          path: |
            ${{ github.workspace }}/openwrt/.config
            ${{ github.workspace }}/openwrt/feeds.conf.default
          include-hidden-files: true

      # ──────────────────────────────────────────────────────
      # 2️⃣1️⃣ 编译固件（核心步骤）
      # ──────────────────────────────────────────────────────
      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=\_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=\_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      # ──────────────────────────────────────────────────────
      # 2️⃣2️⃣ 获取内核版本
      # ──────────────────────────────────────────────────────
      - name: Get kernel version
        run: |
          KERNEL_VER=$(cat /mnt/openwrt/build_dir/target-*/linux-*/linux-*/.kernelversion 2>/dev/null | head -1 || echo "未知")
          echo "KERNEL_VER=$KERNEL_VER" >> $GITHUB_ENV

      # ──────────────────────────────────────────────────────
      # 2️⃣3️⃣ 检查磁盘使用情况
      # ──────────────────────────────────────────────────────
      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      # ──────────────────────────────────────────────────────
      # 2️⃣4️⃣ 修复 Git 大文件传输限制
      # ──────────────────────────────────────────────────────
      - name: Fix Git buffer
        run: git config --global http.postBuffer 524288000

      # ──────────────────────────────────────────────────────
      # 2️⃣5️⃣ 上传 bin 目录（可选）
      # ──────────────────────────────────────────────────────
      - name: Upload bin directory
        uses: actions/upload-artifact@main
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      # ──────────────────────────────────────────────────────
      # 🔥 2️⃣5.5️⃣ 新增：调试检查 sysupgrade.bin 是否生成
      # ──────────────────────────────────────────────────────
      - name: Debug: Check for sysupgrade.bin
        if: ${{ !cancelled() }}
        run: |
          echo "=== 🔍 Checking firmware output directory ==="
          cd openwrt/bin/targets/
          for dir in */*/; do
            echo "--- $dir ---"
            ls -lh "$dir"*.bin "$dir"*.img 2>/dev/null || echo "(no images found)"
          done
          echo ""
          echo "=== 🔍 Searching for sysupgrade.bin ==="
          if find . -name "*sysupgrade.bin" -type f 2>/dev/null | grep -q .; then
            echo "✅ sysupgrade.bin FOUND!"
            find . -name "*sysupgrade.bin" -type f -exec ls -lh {} \;
          else
            echo "⚠️ sysupgrade.bin NOT FOUND"
            echo "💡 可能原因:"
            echo "   1. target/linux/msm89xx/image/Makefile 未定义 IMAGE/sysupgrade.bin"
            echo "   2. .config 未启用 CONFIG_TARGET_ROOTFS_SQUASHFS"
            echo "   3. 设备定义 (msm8916.mk) 未继承 sysupgrade 支持"
          fi

      # ──────────────────────────────────────────────────────
      # 🔥 2️⃣6️⃣ 修改：整理固件产物 + 智能打包（支持 sysupgrade.bin 优先）
      # ──────────────────────────────────────────────────────
      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*/
          rm -rf packages
          PROFILE=${{ github.event.inputs.profile }}
          mkdir -p flash_package
          
          # 🔥 智能查找：优先 sysupgrade.bin，其次 boot.img + system.img
          SYSUPGRADE_BIN=$(ls *sysupgrade.bin 2>/dev/null | head -1)
          BOOT_IMG=$(ls *boot.img.gz *boot.img 2>/dev/null | head -1)
          SYSTEM_IMG=$(ls *system.img.gz *system.img 2>/dev/null | head -1)
          
          echo "🔍 Found images:"
          [ -n "$SYSUPGRADE_BIN" ] && echo "  ✅ sysupgrade.bin: $SYSUPGRADE_BIN" || echo "  ❌ sysupgrade.bin: not found"
          [ -n "$BOOT_IMG" ] && echo "  ✅ boot.img: $BOOT_IMG" || echo "  ❌ boot.img: not found"
          [ -n "$SYSTEM_IMG" ] && echo "  ✅ system.img: $SYSTEM_IMG" || echo "  ❌ system.img: not found"
          
          # 🔥 优先打包 sysupgrade.bin（支持在线升级）
          if [ -n "$SYSUPGRADE_BIN" ]; then
            echo "🎯 Using sysupgrade.bin for online upgrade support"
            cp "$SYSUPGRADE_BIN" flash_package/sysupgrade.bin
            
            # 可选：同时保留 boot.img + system.img 供首次刷写/救砖
            [ -n "$BOOT_IMG" ] && { cp "$BOOT_IMG" flash_package/boot.img.gz && gzip -dk flash_package/boot.img.gz 2>/dev/null; }
            [ -n "$SYSTEM_IMG" ] && { cp "$SYSTEM_IMG" flash_package/system.img.gz && gzip -dk flash_package/system.img.gz 2>/dev/null; }
            
          # 回退方案：只有 boot+system 时打包两者
          elif [ -n "$BOOT_IMG" ] && [ -n "$SYSTEM_IMG" ]; then
            echo "⚠️ No sysupgrade.bin, using boot.img + system.img for manual flash"
            cp "$BOOT_IMG" flash_package/boot.img.gz
            cp "$SYSTEM_IMG" flash_package/system.img.gz
            gzip -dk flash_package/boot.img.gz
            gzip -dk flash_package/system.img.gz
          else
            echo "::error::❌ 固件文件未找到！编译可能失败"
            echo "当前目录文件列表:"
            ls -la
            exit 1
          fi
          
          # 清理 .gz 临时文件
          rm -f flash_package/*.gz
          
          # 复制刷机脚本
          cp -r $GITHUB_WORKSPACE/刷机脚本/. flash_package/
          
          # Windows 兼容：确保 bat 文件为 CRLF 换行
          for f in flash_package/*.bat; do
            [ -f "$f" ] && unix2dos "$f" 2>/dev/null || sed -i 's/$/\r/' "$f"
          done
          
          # 打包 ZIP
          ZIP_NAME="OpenWrt_${PROFILE}${{ env.FILE_DATE }}_刷机包.zip"
          cd flash_package && zip -r "../$ZIP_NAME" . && cd ..
          
          mkdir -p release_files
          mv "$ZIP_NAME" release_files/
          cp *.manifest release_files/ 2>/dev/null || true
          cp *.buildinfo release_files/ 2>/dev/null || true
          cp sha256sums release_files/ 2>/dev/null || true
          
          echo "FIRMWARE=$PWD/release_files" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────────────────
      # 2️⃣7️⃣ 上传固件到 Artifacts
      # ──────────────────────────────────────────────────────
      - name: Upload firmware directory
        uses: actions/upload-artifact@main
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      # ──────────────────────────────────────────────────────
      # 2️⃣8️⃣ 生成 Release 标签 + 说明文档（添加 sysupgrade 说明）
      # ──────────────────────────────────────────────────────
      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          PROFILE=${{ github.event.inputs.profile }}
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")-${PROFILE}" >> $GITHUB_OUTPUT
          touch release.txt
          {
            echo "## Immortalwrt master分支 高通410系列 · ${PROFILE}"
            echo ""
            echo "| 项目 | 信息 |"
            echo "|------|------|"
            echo "| 编译者 | ${{ github.actor }} |"
            echo "| 机型 | ${PROFILE} |"
            echo "| 内核版本 | ${{ env.KERNEL_VER }} |"
            echo "| 管理地址 | 192.168.1.1 |"
            echo "| 默认用户 | root |"
            echo "| 默认密码 | 空 |"
            echo ""
            
            # 🔥 添加 sysupgrade 说明
            if ls openwrt/bin/targets/*/*/*sysupgrade.bin 1>/dev/null 2>&1; then
              echo "### ✅ 支持 sysupgrade 在线升级"
              echo "- 首次刷写：使用 \`boot.img\` + \`system.img\` 手动刷入"
              echo "- 后续升级：直接在 Web UI 或 SSH 中使用 \`sysupgrade.bin\` 在线升级"
              echo "- 配置保留：升级时勾选「保留配置」可保留 /etc/config 等设置"
              echo ""
            else
              echo "### ⚠️ 暂不支持 sysupgrade 在线升级"
              echo "- 请使用 \`boot.img\` + \`system.img\` 手动刷写"
              echo ""
            fi
            
            EXTRA=$(echo '${{ inputs.extra_packages }}' | sed 's/,/ /g' | tr ' ' '\n' | sed '/^$/d')
            if [ -n "$EXTRA" ]; then
              echo "### 额外添加的包"
              echo "$EXTRA" | sed 's/^/- /'
            else
              echo "### 额外添加的包"
              echo "无"
            fi
          } >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────────────────
      # 2️⃣9️⃣ 生成文件清单
      # ──────────────────────────────────────────────────────
      - name: Generate file list
        if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
        run: |
          find ${{ env.FIRMWARE }} -type f > file_list.txt
          echo "Collected files:"
          cat file_list.txt
          test -s file_list.txt || { echo "::error::No firmware files found"; exit 1; }

      # ──────────────────────────────────────────────────────
      # 3️⃣0️⃣ 发布固件到 GitHub Release
      # ──────────────────────────────────────────────────────
      - name: Upload firmware to release
        if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
        uses: ncipollo/release-action@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: ${{ env.FIRMWARE }}/**/**
          artifactErrorsFailBuild: false
          allowUpdates: true
          draft: false
          prerelease: false

      # ──────────────────────────────────────────────────────
      # 3️⃣1️⃣ 自动清理旧 workflow runs
      # ──────────────────────────────────────────────────────
      - name: Delete old workflow runs via GitHub API
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETAIN_DAYS: 7
          KEEP_MINIMUM_RUNS: 5
        run: |
          RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100")
          CUTOFF=$(date -d "-${RETAIN_DAYS} days" +%s)
          DEL_IDS=$(echo "$RUNS" | jq -r --arg cutoff "$CUTOFF" --argjson keep "$KEEP_MINIMUM_RUNS" '
          [.workflow_runs[]
          |
          select((now - (.created_at | fromdateiso8601)) > ($cutoff | tonumber))
          |
          {id, created_at}
          ]
          | sort_by(.created_at)
          | .[:-$keep]
          | .[].id
          ')
          if [[ -z "$DEL_IDS" ]]; then
            echo "No old runs to delete."
          else
            echo "$DEL_IDS" | while read run_id; do
              echo "Deleting run $run_id"
              curl -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
            done
          fi
